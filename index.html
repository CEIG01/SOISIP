<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Concrete House 3D</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        p { font-size: 16px; color: #86868b; margin-bottom: 40px; max-width: 90%; line-height: 1.4; }
        .ar-button {
            display: inline-block;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            background-color: #0071e3;
            border-radius: 980px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
            transition: all 0.2s ease;
        }
        .ar-button:active {
            background-color: #005bb5;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <h1>Modern Concrete House</h1>
    <p>Tap the button below on your iPhone or iPad to open the concrete house model natively in AR.</p>

    <a href="modern_house.usdz" rel="ar" class="ar-button">
        View in AR
    </a>
</body>
</html>
